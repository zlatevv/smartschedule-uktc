<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSchedule - Админ Панел</title>
    <link rel="stylesheet" href="/frontend/css/base.css">
    <link rel="stylesheet" href="/frontend/css/components.css">
    <link rel="stylesheet" href="/frontend/css/layout.css">
    <link rel="stylesheet" href="/frontend/css/variables.css">
</head>
<body>

    <header style="justify-content: space-between; padding: 0 40px;">
        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            SmartSchedule <span style="color: #6B7280; font-weight: normal; margin-left: 8px;">| Админ</span>
        </div>
        <button id="logoutBtn" style="background: none; border: none; color: #EF4444; font-weight: 600; cursor: pointer; font-size: 1rem;">Изход</button>
    </header>

    <main class="admin-main">
        <div class="section-box admin-full-width">
            <div class="admin-header-flex">
                <div>
                    <h2>Редакция на седмична програма</h2>
                    <p class="subtitle">Клас: 
                        <select id="class-select-admin">
                            <option value="8a">8А Клас</option>
                            <option value="9a">9А Клас</option>
                            <option value="10a">10А Клас</option>
                        </select>
                    </p>
                </div>
                <button class="btn-primary save-btn-top">Запази всичко</button>
            </div>

            <div class="admin-table-wrapper">
                <table class="admin-schedule-table">
                    <thead>
                        <tr>
                            <th>Час</th>
                            <th>Понеделник</th>
                            <th>Вторник</th>
                            <th>Сряда</th>
                            <th>Четвъртък</th>
                            <th>Петък</th>
                        </tr>
                    </thead>
                    <tbody>
                        <script>
                            const days = ['mon', 'tue', 'wed', 'thu', 'fri'];
                            for (let i = 1; i <= 7; i++) {
                                document.write(`
                                    <tr>
                                        <td class="hour-col">${i} час</td>
                                        ${days.map(day => `
                                            <td>
                                                <div class="cell-edit">
                                                    <input type="text" placeholder="Предмет" class="inp-sub" data-slot="${day}-${i}-sub">
                                                    <input type="text" placeholder="Стая" class="inp-room" data-slot="${day}-${i}-room">
                                                </div>
                                            </td>
                                        `).join('')}
                                    </tr>
                                `);
                            }
                        </script>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

</body>
</html>
