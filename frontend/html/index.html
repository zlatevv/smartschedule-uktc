<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calypso Bet</title>
  <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body>
  <div id="signupModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2>Sign Up</h2>
      <input type="text" id="signupUsername" placeholder="Username">
      <input type="email" id="signupEmail" placeholder="Email">
      <input type="password" id="signupPassword" placeholder="Password">
      <button onclick="signup()">Submit</button>
      <button onclick="closeSignup()">Close</button>
    </div>
  </div>

  <!-- Sign In Modal -->
  <div id="loginModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2>Sign In</h2>
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Password">
      <button onclick="login()">Submit</button>
      <button onclick="closeLogin()">Close</button>
    </div>
  </div>
    <header class="top-bar">
      <div class="brand"><a href="#">Calypso Bet</a></div>
      <div class="logo"><img src="/images/logo.png" alt="logo"></div>
      <div class="auth">
        <button class="signin">Sign In</button>
        <button class="signup">Sign Up</button>
      </div>
  </header>

  <div class="search-bar">
    <input type="text" placeholder="Search...">
  </div>

  <nav class="main-nav">
    <a href="/frontend/html/slots.html"><img src="/images/slots.jpg" alt="slots"></a>
    <a href="/frontend/html/sportsbet.html"><img src="/images/sportsbet.jpg" alt="sportsbet"></a>
    <a href="/frontend/html/roulette.html"><img src="/images/roullette.jpg" alt="roulette"></a>
  </nav>

  <footer>
    <div class="links">
      <a href="/frontend/html/index.html">Home</a>
      <a href="#">About Us</a>
      <a href="#">Contacts</a>
    </div>
    <p>© 2025 Calypso Bet</p>
  </footer>
    <script src="/frontend/js/main.js"></script>  
</body>
</html>
