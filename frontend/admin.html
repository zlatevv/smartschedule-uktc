<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSchedule - Админ Панел</title>
    <link rel="stylesheet" href="/frontend/css/base.css">
    <link rel="stylesheet" href="/frontend/css/components.css">
    <link rel="stylesheet" href="/frontend/css/layout.css">
    <link rel="stylesheet" href="/frontend/css/variables.css">
    <link rel="stylesheet" href="/frontend/css/admin.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <header style="justify-content: space-between; padding: 0 40px; display: flex; align-items: center; height: 70px; border-bottom: 1px solid var(--border-color); background: #fff;">
        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            SmartSchedule <span style="color: #6B7280; font-weight: normal; margin-left: 8px;">| Админ</span>
        </div>
        <button id="logoutBtn" style="background: none; border: none; color: #EF4444; font-weight: 600; cursor: pointer; font-size: 1rem;">Изход</button>
    </header>

    <main class="admin-main" style="padding: 30px;">
        <div class="admin-layout-container">
            <div class="section-box admin-full-width" style="margin: 0; flex-grow: 1;">
                <div class="admin-header-flex">
                    <div>
                        <h2>Редакция на седмична програма</h2>
                        <p class="subtitle" style="display: flex; align-items: center; gap: 10px;">Клас: 
                            <select id="class-select-admin" class="custom-select-btn">
                            </select>
                            <button class="btn-secondary btn-add-class" style="padding: 10px 15px;">+ Добави клас</button>
                        </p>
                    </div>
                    <button type = "button" id="btn-generate" class="btn-secondary btn-generate">🪄 Генерирай</button>
                    <button class="btn-primary save-btn-top">Експортирай в PDF</button>
                </div>

                <div class="admin-table-wrapper">
    
                    <div style="text-align: right; margin-bottom: 10px; font-weight: bold; color: #555; padding-right: 15px;">
                        <span id="teacher-display"></span>
                    </div>

                    <table class="admin-schedule-table">
                        <thead>
                            <tr>
                                <th>Час</th>
                                <th>Понеделник</th>
                                <th>Вторник</th>
                                <th>Сряда</th>
                                <th>Четвъртък</th>
                                <th>Петък</th>
                            </tr>
                        </thead>
                        <tbody id="schedule-tbody">
                        </tbody>
                    </table>
                </div>
            </div>

            <aside class="subjects-sidebar">
                <div class="sidebar-header">
                    <h3 style="margin-top: 0;">Предмети</h3>
                    <button class="btn-add-subject" id="add-subject-btn">+ Добави предмет</button>
                </div>
                
                <div class="subjects-list" id="subjects-list">
                </div>
                
                <p style="font-size: 0.8rem; color: #6B7280; margin-top: 20px; text-align: center; line-height: 1.4;">
                    💡 Хвани и пусни предмет в таблицата.<br>Или кликни поле, после кликни предмет.
                </p>
            </aside>

        </div>
    </main>

    <div id="modal-add-class" class="modal-overlay">
        <div class="modal-box">
            <h3>Добави нов клас</h3>
            
            <div class="modal-form-group">
                <label>Име на класа (напр. 261):</label>
                <input type="text" id="input-new-class" class="modal-input" placeholder="Име на клас...">
            </div>

            <div class="modal-form-group">
                <label>Класен ръководител:</label>
                <select id="select-class-teacher" class="modal-input">
                    <option value="">-- Изберете учител --</option>
                </select>
            </div>

            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal('modal-add-class')">Отказ</button>
                <button class="btn-primary" id="confirm-add-class">Добави клас</button>
            </div>
        </div>
    </div>

    <div id="modal-add-subject" class="modal-overlay">
        <div class="modal-box">
            <h3>Добави нов предмет</h3>
            
            <div class="modal-form-group">
                <label>Име на предмета:</label>
                <input type="text" id="input-new-subject" class="modal-input" placeholder="Напр. Математика...">
            </div>

            <div class="modal-form-group">
                <label>Описание:</label>
                <textarea id="input-subject-desc" class="modal-input" placeholder="Кратко описание..." rows="3"></textarea>
            </div>

            <div class="modal-form-group">
                <label>Тип на предмета:</label>
                <select id="select-subject-type" class="modal-input">
                    <option>Общообразователен</option>
                    <option>Професионален</option>
                    <option>Практика</option>
                    <option>Извънкласен</option>
                </select>
            </div>

            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal('modal-add-subject')">Отказ</button>
                <button class="btn-primary" id="confirm-add-subject">Добави предмет</button>
            </div>
        </div>
    </div>

    <script src="/frontend/js/global.js"></script>
    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/pdf.js"></script>
    <script src="/frontend/js/app.js"></script>
    <script src="/frontend/js/admin.js"></script>
    <script src="/frontend/js/dragAndDrop.js"></script>
</body>
</html>
